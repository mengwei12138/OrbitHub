<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1500">
  <title>添加账号 - 交互泳道图</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8C8C8C"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52C41A"/>
    </marker>
    <marker id="arrowhead-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF4D4F"/>
    </marker>
  </defs>

  <rect width="1400" height="1500" fill="#FAFAFA"/>

  <text x="700" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#262626">添加账号 - 交互泳道图</text>

  <!-- ========== 泳道 ========== -->
  <rect x="10" y="55" width="200" height="1430" fill="#E6F4FF" stroke="#1677FF" stroke-width="2" rx="4"/>
  <text x="110" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1677FF">用户</text>

  <rect x="220" y="55" width="400" height="1430" fill="#F6FFED" stroke="#52C41A" stroke-width="2" rx="4"/>
  <text x="420" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#52C41A">前端组件</text>

  <rect x="630" y="55" width="350" height="1430" fill="#FFF7E6" stroke="#FA8C16" stroke-width="2" rx="4"/>
  <text x="805" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#FA8C16">后端 API</text>

  <rect x="990" y="55" width="400" height="1430" fill="#F9F0FF" stroke="#722ED1" stroke-width="2" rx="4"/>
  <text x="1190" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#722ED1">数据库</text>

  <!-- ========== 主流程分隔线 ========== -->
  <line x1="10" y1="110" x2="1390" y2="110" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="15" y="105" font-size="12" fill="#8C8C8C">主流程：添加账号表单</text>

  <!-- ========== step 0: 获取地区字典 ========== -->
  <circle cx="110" cy="145" r="18" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="150" text-anchor="middle" font-size="11" fill="white">0</text>

  <rect x="660" y="128" width="220" height="34" rx="4" fill="#FFF7E6" stroke="#FA8C16" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="770" y="150" text-anchor="middle" font-size="11">GET /accounts/regions</text>

  <rect x="240" y="128" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="150" text-anchor="middle" font-size="11">RegionSelect</text>

  <line x1="128" y1="145" x2="240" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="145" x2="660" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="880" y1="145" x2="450" y2="145" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="450" y1="145" x2="450" y2="210" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="450" y1="210" x2="240" y2="210" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== step 1: 选择地区、平台、手机号 ========== -->
  <circle cx="110" cy="250" r="18" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="255" text-anchor="middle" font-size="11" fill="white">1</text>

  <rect x="240" y="228" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="250" text-anchor="middle" font-size="11">RegionSelect</text>

  <rect x="240" y="275" width="100" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="290" y="297" text-anchor="middle" font-size="11">选择平台</text>

  <rect x="240" y="322" width="100" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="290" y="344" text-anchor="middle" font-size="11">输入手机号</text>

  <line x1="128" y1="250" x2="240" y2="250" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="128" y1="250" x2="128" y2="275" stroke="#666" stroke-width="1.5"/>
  <line x1="128" y1="275" x2="240" y2="275" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="128" y1="250" x2="128" y2="322" stroke="#666" stroke-width="1.5"/>
  <line x1="128" y1="322" x2="240" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== step 2: 获取验证码 ========== -->
  <circle cx="110" cy="400" r="18" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="405" text-anchor="middle" font-size="11" fill="white">2</text>

  <rect x="660" y="378" width="220" height="34" rx="4" fill="#FFF7E6" stroke="#FA8C16" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="770" y="400" text-anchor="middle" font-size="11">POST /verify-code</text>

  <rect x="240" y="378" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="400" text-anchor="middle" font-size="11">SendCodeButton</text>

  <line x1="305" y1="356" x2="370" y2="356" stroke="#666" stroke-width="1.5"/>
  <line x1="370" y1="356" x2="370" y2="400" stroke="#666" stroke-width="1.5"/>
  <line x1="370" y1="400" x2="660" y2="400" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="305" y1="400" x2="240" y2="400" stroke="#666" stroke-width="1.5"/>
  <line x1="240" y1="400" x2="240" y2="378" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== step 3: 输入验证码 ========== -->
  <circle cx="110" cy="460" r="18" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="465" text-anchor="middle" font-size="11" fill="white">3</text>

  <rect x="240" y="438" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="460" text-anchor="middle" font-size="11">CodeInput</text>

  <line x1="128" y1="460" x2="240" y2="460" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== step 4: 点击下一步 ========== -->
  <circle cx="110" cy="520" r="18" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="525" text-anchor="middle" font-size="11" fill="white">4</text>

  <rect x="660" y="498" width="220" height="34" rx="4" fill="#FFF7E6" stroke="#FA8C16" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="770" y="520" text-anchor="middle" font-size="11">POST /verify-code/submit</text>

  <rect x="240" y="498" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="520" text-anchor="middle" font-size="11">NextButton</text>

  <line x1="305" y1="480" x2="370" y2="480" stroke="#666" stroke-width="1.5"/>
  <line x1="370" y1="480" x2="370" y2="520" stroke="#666" stroke-width="1.5"/>
  <line x1="370" y1="520" x2="660" y2="520" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="305" y1="520" x2="240" y2="520" stroke="#666" stroke-width="1.5"/>
  <line x1="240" y1="520" x2="240" y2="498" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== step 5: 验证成功，根据 flow 类型分支 ========== -->
  <circle cx="110" cy="580" r="18" fill="#52C41A" stroke="#389E0D" stroke-width="2"/>
  <text x="110" y="585" text-anchor="middle" font-size="11" fill="white">5</text>

  <!-- 分支判断框 -->
  <rect x="240" y="558" width="180" height="44" rx="6" fill="#F0F5FF" stroke="#1677FF" stroke-width="2"/>
  <text x="330" y="575" text-anchor="middle" font-size="10" fill="#1677FF">判断 flow 类型</text>
  <text x="330" y="592" text-anchor="middle" font-size="9" fill="#8C8C8C">response.flow</text>

  <!-- SMS_ONLY 分支 -->
  <rect x="240" y="630" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="652" text-anchor="middle" font-size="11">Message.success</text>

  <rect x="450" y="630" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="515" y="652" text-anchor="middle" font-size="11">跳转/account</text>

  <!-- NEED_QR 分支 -->
  <rect x="450" y="558" width="130" height="44" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="515" y="575" text-anchor="middle" font-size="10">QRCodeView</text>
  <text x="515" y="592" text-anchor="middle" font-size="9" fill="#8C8C8C">显示二维码</text>

  <rect x="450" y="720" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="515" y="742" text-anchor="middle" font-size="11">QRCodeView</text>

  <!-- 连接线 -->
  <line x1="990" y1="520" x2="500" y2="520" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="500" y1="520" x2="500" y2="558" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="500" y1="580" x2="330" y2="580" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="420" y1="580" x2="420" y2="630" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="420" y1="630" x2="240" y2="630" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="370" y1="630" x2="370" y2="647" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="370" y1="647" x2="450" y2="647" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="450" y1="647" x2="450" y2="630" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="580" y1="580" x2="580" y2="647" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="580" y1="647" x2="450" y2="647" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="420" y1="720" x2="420" y2="739" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="420" y1="739" x2="580" y2="739" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="580" y1="739" x2="580" y2="720" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 分支标签 -->
  <text x="200" y="620" font-size="9" fill="#52C41A">SMS_ONLY</text>
  <text x="600" y="575" font-size="9" fill="#52C41A">NEED_QR</text>

  <!-- ========== step 6: 验证失败 ========== -->
  <circle cx="110" cy="800" r="18" fill="#FF4D4F" stroke="#CF1322" stroke-width="2"/>
  <text x="110" y="805" text-anchor="middle" font-size="11" fill="white">6</text>

  <rect x="240" y="778" width="130" height="34" rx="4" fill="#FFCCC7" stroke="#FF4D4F" stroke-width="2"/>
  <text x="305" y="800" text-anchor="middle" font-size="11">Message.error</text>

  <line x1="990" y1="520" x2="500" y2="520" stroke="#FF4D4F" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>
  <line x1="500" y1="800" x2="240" y2="800" stroke="#FF4D4F" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>

  <!-- ========== step 7: 轮询 sessionId 状态 (NEED_QR分支) ========== -->
  <circle cx="110" cy="870" r="18" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="875" text-anchor="middle" font-size="11" fill="white">7</text>

  <rect x="660" y="848" width="220" height="34" rx="4" fill="#FFF7E6" stroke="#FA8C16" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="770" y="870" text-anchor="middle" font-size="11">GET /login/{sessionId}/status</text>

  <rect x="240" y="848" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="870" text-anchor="middle" font-size="11">QRCodeView</text>

  <line x1="515" y1="760" x2="370" y2="760" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="370" y1="760" x2="370" y2="870" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="370" y1="870" x2="660" y2="870" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== step 8: 登录成功 ========== -->
  <circle cx="110" cy="930" r="18" fill="#52C41A" stroke="#389E0D" stroke-width="2"/>
  <text x="110" y="935" text-anchor="middle" font-size="11" fill="white">8</text>

  <rect x="240" y="908" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="930" text-anchor="middle" font-size="11">Message.success</text>

  <rect x="240" y="955" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="977" text-anchor="middle" font-size="11">跳转/account</text>

  <line x1="990" y1="870" x2="500" y2="870" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="500" y1="870" x2="500" y2="930" stroke="#52C41A" stroke-width="1.5"/>
  <line x1="500" y1="930" x2="240" y2="930" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="305" y1="930" x2="305" y2="955" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== step 9: 登录失败或超时 ========== -->
  <circle cx="110" cy="1010" r="18" fill="#FF4D4F" stroke="#CF1322" stroke-width="2"/>
  <text x="110" y="1015" text-anchor="middle" font-size="11" fill="white">9</text>

  <rect x="240" y="988" width="130" height="34" rx="4" fill="#FFCCC7" stroke="#FF4D4F" stroke-width="2"/>
  <text x="305" y="1010" text-anchor="middle" font-size="11">Message.error</text>

  <rect x="240" y="1035" width="130" height="34" rx="4" fill="#FFF7E6" stroke="#FA8C16" stroke-width="2"/>
  <text x="305" y="1057" text-anchor="middle" font-size="11">RefreshButton</text>

  <line x1="990" y1="870" x2="500" y2="870" stroke="#FF4D4F" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>
  <line x1="500" y1="870" x2="500" y2="1010" stroke="#FF4D4F" stroke-width="1.5"/>
  <line x1="500" y1="1010" x2="240" y2="1010" stroke="#FF4D4F" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>
  <line x1="305" y1="1010" x2="305" y2="1035" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 子流程：手机号校验 ========== -->
  <line x1="10" y1="1100" x2="1390" y2="1100" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="15" y="1095" font-size="12" fill="#8C8C8C">子流程：手机号实时校验</text>

  <circle cx="110" cy="1130" r="16" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="1135" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="240" y="1110" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="1132" text-anchor="middle" font-size="11">PhoneInput</text>

  <line x1="128" y1="1130" x2="240" y2="1130" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="110" cy="1180" r="16" fill="#52C41A" stroke="#389E0D" stroke-width="2"/>
  <text x="110" y="1185" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="240" y="1160" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="1182" text-anchor="middle" font-size="11">validate</text>

  <line x1="305" y1="1145" x2="305" y2="1160" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 子流程：地区级联选择 ========== -->
  <line x1="10" y1="1240" x2="1390" y2="1240" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="15" y="1235" font-size="12" fill="#8C8C8C">子流程：地区级联选择</text>

  <circle cx="110" cy="1270" r="16" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="1275" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="240" y="1250" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="1272" text-anchor="middle" font-size="11">选择省份</text>

  <line x1="128" y1="1270" x2="240" y2="1270" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="110" cy="1320" r="16" fill="#1677FF" stroke="#096DD9" stroke-width="2"/>
  <text x="110" y="1325" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="240" y="1300" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="1322" text-anchor="middle" font-size="11">选择城市</text>

  <line x1="305" y1="1285" x2="305" y2="1300" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="110" cy="1370" r="16" fill="#52C41A" stroke="#389E0D" stroke-width="2"/>
  <text x="110" y="1375" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="240" y="1350" width="130" height="34" rx="4" fill="#B7EB8F" stroke="#52C41A" stroke-width="2"/>
  <text x="305" y="1372" text-anchor="middle" font-size="11">直辖市直接确定</text>

  <line x1="305" y1="1335" x2="305" y2="1350" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 图例 ========== -->
  <rect x="1000" y="1100" width="380" height="140" fill="#FAFAFA" stroke="#E8E8E8" rx="4"/>
  <circle cx="1020" cy="1120" r="6" fill="#1677FF" stroke="#096DD9" stroke-width="1"/>
  <text x="1030" y="1123" font-size="10">步骤</text>
  <line x1="1070" y1="1120" x2="1100" y2="1120" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="1110" y="1123" font-size="10">正常</text>
  <line x1="1140" y1="1120" x2="1170" y2="1120" stroke="#52C41A" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <text x="1180" y="1123" font-size="10">成功</text>
  <line x1="1020" y1="1150" x2="1050" y2="1150" stroke="#FF4D4F" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>
  <text x="1060" y="1153" font-size="10">失败</text>
  <rect x="1020" y="1170" width="80" height="22" rx="2" fill="#FFF7E6" stroke="#FA8C16" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="1060" y="1185" font-size="9">API 调用</text>
  <rect x="1020" y="1200" width="100" height="22" rx="2" fill="#F0F5FF" stroke="#1677FF" stroke-width="1"/>
  <text x="1070" y="1215" font-size="9">判断分支</text>
</svg>