# 添加账号 - 表单交互
interaction:
  type: form
  name: 添加账号表单
  trigger:
    component: AddAccountForm
    action: onSubmit

  mainFlow:
    - step: 0
      description: 页面加载，获取地区字典
      async: true
      parallel:
        - name: 调用 GET /api/v1/accounts/regions
          api:
            method: GET
            url: /api/v1/accounts/regions
        - name: 显示 loading
          component: RegionSelect
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_1
      onFail: step_error

    - step: 1
      description: 步骤1-选择地区、平台与手机号验证
      parallel:
        - name: 选择登录地区（默认选中「重庆」）
          component: RegionSelect
          action:
            method: setValue
            props:
              province: '{provinces[0].code}'
              city: '{provinces[0].cities[0].code}'
        - name: 选择平台
          component: PlatformSelect
          action:
            method: setValue
        - name: 输入手机号
          component: PhoneInput
          action:
            method: setValue

    - step: 2
      description: 获取验证码
      parallel:
        - name: 调用 POST /api/v1/accounts/login/verify-code
          api:
            method: POST
            url: /api/v1/accounts/login/verify-code
            request:
              platform: '{platform}'
              phoneNumber: '{phoneNumber}'
              region: '{region}'
        - name: 开始倒计时
          component: SendCodeButton
          action:
            method: startCountdown
            props:
              seconds: '{response.countdown || 60}'
      onSuccess: step_3
      onFail: step_6

    - step: 3
      description: 输入验证码
      component: CodeInput
      action:
        method: setValue

    - step: 4
      description: 点击下一步
      parallel:
        - name: 调用 POST /api/v1/accounts/login/verify-code/submit
          api:
            method: POST
            url: /api/v1/accounts/login/verify-code/submit
            request:
              platform: '{platform}'
              phoneNumber: '{phoneNumber}'
              code: '{code}'
              requestId: '{requestId}'
              region: '{region}'
        - name: 显示 loading
          component: NextButton
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_5
      onFail: step_6

    - step: 5
      description: 验证成功，根据 flow 类型进入不同分支
      parallel:
        - name: 判断 flow 类型
          component: state
          action:
            method: setLoginFlow
            props:
              value: '{response.flow}'
        - name: 停止 loading
          component: NextButton
          action:
            method: setLoading
            props:
              loading: false
      branches:
        - condition: response.flow == 'SMS_ONLY'
          sequence:
            - step: 5a
              description: 无需扫码，直接跳转账号列表
              parallel:
                - name: 显示成功提示
                  component: Message
                  action:
                    method: success
                    props:
                      content: 验证成功
                - name: 跳转账号列表
                  component: router
                  action:
                    method: push
                    props:
                      path: /datacenter
        - condition: response.flow == 'NEED_QR'
          sequence:
            - step: 5b
              description: 需要扫码，显示二维码
              parallel:
                - name: 显示二维码
                  component: QRCodeView
                  action:
                    method: show
                    props:
                      url: '{response.qrCodeUrl}'
                      expireAt: '{response.expireSeconds}'
                - name: 保存 sessionId
                  component: state
                  action:
                    method: setSessionId
                    props:
                      value: '{response.sessionId}'
              onSuccess: step_7

    - step: 6
      description: 验证失败
      parallel:
        - name: 显示错误提示
          component: Message
          action:
            method: error
            props:
              content: '{error.message}'
        - name: 停止 loading
          component: NextButton
          action:
            method: setLoading
            props:
              loading: false

    - step: 7
      description: 轮询 sessionId 状态，等待登录成功或失败/过期
      parallel:
        - name: 轮询 GET /api/v1/accounts/login/{sessionId}/status
          api:
            method: GET
            url: /api/v1/accounts/login/{sessionId}/status
            params:
              sessionId: '{response.sessionId}'
        - name: 显示等待中
          component: QRCodeView
          action:
            method: setStatus
            props:
              status: waiting
      onSuccess: step_8
      onFail: step_9

    - step: 8
      description: 登录成功，账号入库完成
      parallel:
        - name: 显示成功提示
          component: Message
          action:
            method: success
            props:
              content: 账号添加成功
        - name: 跳转账号列表
          component: router
          action:
            method: push
            props:
              path: /datacenter

    - step: 9
      description: 登录失败或超时
      parallel:
        - name: 显示错误提示
          component: Message
          action:
            method: error
            props:
              content: '{error.message || "处理超时，请刷新二维码重试"}'
        - name: 显示刷新按钮
          component: RefreshButton
          action:
            method: show

---
# 手机号校验 - 失去焦点触发
phone_validation:
  type: form-field
  name: 手机号实时校验
  trigger:
    component: PhoneInput
    action: onBlur

  mainFlow:
    - step: 1
      description: 用户输入手机号后失去焦点，触发校验
      parallel:
        - name: 调用 validatePhone 校验
          component: PhoneInput
          action:
            method: validate
        - name: 触发校验提示
          component: PhoneInput
          action:
            method: setTouched
            props:
              touched: true
      onSuccess: step_2
      onFail: step_3

    - step: 2
      description: 校验通过，清除错误提示
      parallel:
        - name: 清除错误提示
          component: PhoneInput
          action:
            method: clearError
        - name: 可正常提交
          component: Form
          action:
            method: enableSubmit

    - step: 3
      description: 校验失败，显示错误
      parallel:
        - name: 显示错误提示
          component: PhoneInput
          action:
            method: showError
            props:
              message: 手机号格式不正确
        - name: 禁用提交按钮
          component: Form
          action:
            method: disableSubmit

---
# 刷新二维码 - 异步交互
refresh_qrcode:
  type: async
  name: 刷新二维码
  trigger:
    component: RefreshButton
    action: onClick

  mainFlow:
    - step: 1
      description: 请求新二维码
      parallel:
        - name: 调用 POST /api/v1/accounts/login/qr-code/refresh
          api:
            method: POST
            url: /api/v1/accounts/login/qr-code/refresh
            request:
              sessionId: '{sessionId}'
        - name: 显示 loading
          component: RefreshButton
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_2
      onFail: step_3

    - step: 2
      description: 更新二维码
      parallel:
        - name: 刷新二维码
          component: QRCodeView
          action:
            method: refresh
            props:
              url: '{response.qrCodeUrl}'
              expireAt: '{response.expireSeconds}'
        - name: 停止 loading
          component: RefreshButton
          action:
            method: setLoading
            props:
              loading: false

    - step: 3
      description: 刷新失败
      component: Message
      action:
        method: error
        props:
          content: '{error.message}'

  randomEvents:
    - trigger: 用户点击取消
      name: 跳转账号列表
      component: router
      action:
        method: push
        props:
          path: /datacenter

---
# 返回上一步 - 状态清理
return_to_previous:
  type: navigation
  name: 返回上一步
  trigger:
    component: BackButton
    action: onClick

  mainFlow:
    - step: 1
      description: 清理扫码相关状态，停止轮询
      parallel:
        - name: 清空 sessionId
          component: state
          action:
            method: setSessionId
            props:
              value: ''
        - name: 清理二维码数据
          component: QRCodeView
          action:
            method: clear
        - name: 重置 flow 状态
          component: state
          action:
            method: setLoginFlow
            props:
              value: null
        - name: 返回步骤0
          component: Steps
          action:
            method: setCurrent
            props:
              step: 0

---
# 地区级联选择 - 交互
region_selection:
  type: form-field
  name: 地区级联选择
  trigger:
    component: RegionSelect
    action: onChange

  mainFlow:
    - step: 1
      description: 选择省份，加载城市列表
      condition: selected.type == 'province'
      parallel:
        - name: 更新已选省份
          component: RegionSelect
          action:
            method: setProvince
            props:
              province: '{province}'
        - name: 加载城市列表
          component: RegionSelect
          action:
            method: loadCities
            props:
              cities: '{province.cities}'

    - step: 2
      description: 选择城市
      condition: selected.type == 'city'
      parallel:
        - name: 更新已选城市
          component: RegionSelect
          action:
            method: setCity
            props:
              city: '{city}'
        - name: 更新表单 region 字段
          component: AddAccountForm
          action:
            method: setFieldValue
            props:
              field: region
              value: '{city.code}'

    - step: 3
      description: 直辖市直接选中
      condition: province.isMunicipality == true
      parallel:
        - name: 直接设置城市为省份
          component: RegionSelect
          action:
            method: setCity
            props:
              city: '{province.code}'
        - name: 更新表单 region 字段
          component: AddAccountForm
          action:
            method: setFieldValue
            props:
              field: region
              value: '{province.code}'

---
# 地区必填校验 - 交互
region_validation:
  type: form-field
  name: 地区必填校验
  trigger:
    component: SendCodeButton
    action: onClick

  mainFlow:
    - step: 1
      description: 校验地区是否已选择
      parallel:
        - name: 获取地区值
          component: RegionSelect
          action:
            method: getValue
        - name: 获取手机号值
          component: PhoneInput
          action:
            method: getValue
      onSuccess: step_2
      onFail: step_3

    - step: 2
      description: 地区已选择，继续获取验证码流程
      parallel:
        - name: 启用获取验证码
          component: SendCodeButton
          action:
            method: enable
        - name: 清除地区错误提示
          component: RegionSelect
          action:
            method: clearError

    - step: 3
      description: 地区未选择，显示错误
      parallel:
        - name: 显示错误提示
          component: RegionSelect
          action:
            method: showError
            props:
              message: 请选择登录地区
        - name: 高亮地区选择框
          component: RegionSelect
          action:
            method: setStatus
            props:
              status: error
        - name: 禁用获取验证码
          component: SendCodeButton
          action:
            method: disable
