<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <title>日志管理 - 交互泳道图</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrowhead-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#fafafa"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">日志管理 - 交互泳道图</text>

  <rect x="10" y="60" width="150" height="540" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="85" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1890ff">用户</text>

  <rect x="170" y="60" width="280" height="540" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="310" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#52c41a">前端组件</text>

  <rect x="460" y="60" width="220" height="540" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="570" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fa8c16">后端 API</text>

  <rect x="690" y="60" width="200" height="540" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="790" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#722ed1">数据库</text>

  <text x="20" y="110" font-size="11" fill="#8c8c8c">主流程 - 账号信息加载</text>

  <circle cx="85" cy="130" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="85" y="135" text-anchor="middle" font-size="12" fill="white">开始</text>

  <rect x="200" y="115" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="270" y="135" text-anchor="middle" font-size="11">AccountInfoCard onMount</text>

  <line x1="103" y1="130" x2="200" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="200" y="155" width="140" height="30" rx="5" fill="#fff" stroke="#1890ff" stroke-width="1.5"/>
  <text x="270" y="175" text-anchor="middle" font-size="11">显示 Loading</text>

  <rect x="480" y="155" width="180" height="30" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="570" y="175" text-anchor="middle" font-size="11">GET /api/v1/accounts/{id}</text>

  <line x1="340" y1="170" x2="480" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="710" y="155" width="160" height="30" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="790" y="175" text-anchor="middle" font-size="11">查询账号信息</text>

  <line x1="660" y1="170" x2="710" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="480" y="200" width="180" height="30" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="570" y="220" text-anchor="middle" font-size="11">返回账号信息</text>

  <line x1="790" y1="185" x2="660" y2="215" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="200" y="200" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="270" y="220" text-anchor="middle" font-size="11">渲染账号信息卡片</text>

  <line x1="480" y1="215" x2="340" y2="215" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <text x="20" y="260" font-size="11" fill="#8c8c8c">主流程 - 日志列表加载</text>

  <rect x="200" y="280" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="270" y="300" text-anchor="middle" font-size="11">LogTable onMount</text>

  <line x1="340" y1="295" x2="480" y2="295" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="200" y="320" width="140" height="30" rx="5" fill="#fff" stroke="#1890ff" stroke-width="1.5"/>
  <text x="270" y="340" text-anchor="middle" font-size="11">显示 Loading</text>

  <rect x="480" y="320" width="180" height="30" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="570" y="340" text-anchor="middle" font-size="11">GET /api/v1/accounts/{id}/logs</text>

  <line x1="340" y1="335" x2="480" y2="335" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="710" y="320" width="160" height="30" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="790" y="340" text-anchor="middle" font-size="11">查询日志列表</text>

  <line x1="660" y1="335" x2="710" y2="335" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="480" y="365" width="180" height="30" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="570" y="385" text-anchor="middle" font-size="11">返回日志列表</text>

  <line x1="790" y1="350" x2="660" y2="380" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="200" y="365" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="270" y="385" text-anchor="middle" font-size="11">渲染日志列表</text>

  <line x1="480" y1="380" x2="340" y2="380" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="200" y="405" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="270" y="425" text-anchor="middle" font-size="11">渲染分页器</text>

  <text x="20" y="465" font-size="11" fill="#8c8c8c">随机事件</text>

  <rect x="30" y="485" width="130" height="25" rx="5" fill="#d9f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="95" y="503" text-anchor="middle" font-size="10">切换日期筛选</text>

  <rect x="200" y="485" width="140" height="25" rx="5" fill="#fff" stroke="#52c41a" stroke-width="1.5"/>
  <text x="270" y="503" text-anchor="middle" font-size="10">reload(startDate, endDate)</text>

  <line x1="160" y1="497" x2="200" y2="497" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="30" y="525" width="130" height="25" rx="5" fill="#d9f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="95" y="543" text-anchor="middle" font-size="10">输入关键词搜索</text>

  <rect x="200" y="525" width="140" height="25" rx="5" fill="#fff" stroke="#52c41a" stroke-width="1.5"/>
  <text x="270" y="543" text-anchor="middle" font-size="10">reload(keyword)</text>

  <line x1="160" y1="537" x2="200" y2="537" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="370" y="485" width="130" height="25" rx="5" fill="#d9f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="435" y="503" text-anchor="middle" font-size="10">点击「清空」</text>

  <rect x="530" y="485" width="140" height="25" rx="5" fill="#fff" stroke="#52c41a" stroke-width="1.5"/>
  <text x="600" y="503" text-anchor="middle" font-size="10">reload(keyword='')</text>

  <line x1="500" y1="497" x2="530" y2="497" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="30" y="565" width="130" height="25" rx="5" fill="#d9f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="95" y="583" text-anchor="middle" font-size="10">切换分页</text>

  <rect x="200" y="565" width="140" height="25" rx="5" fill="#fff" stroke="#52c41a" stroke-width="1.5"/>
  <text x="270" y="583" text-anchor="middle" font-size="10">reload(page, pageSize)</text>

  <line x1="160" y1="577" x2="200" y2="577" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="370" y="565" width="220" height="30" fill="#fafafa" stroke="#d9d9d9" rx="5"/>
  <line x1="380" y1="580" x2="410" y2="580" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="420" y="584" font-size="9">刷新列表</text>
  <line x1="480" y1="580" x2="510" y2="580" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <text x="520" y="584" font-size="9">成功流程</text>
</svg>