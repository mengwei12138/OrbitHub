          component: StartButton
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_2
      onFail: step_3

    - step: 2
      description: 启动成功
      parallel:
        - name: 刷新列表
          component: AccountTable
          action:
            method: reload
        - name: 显示成功提示
          component: Message
          action:
            method: success
            props:
