---
# 批量停止 - 确认交互
batch_stop_interaction:
  type: confirm
  name: 批量停止账号
  trigger:
    component: BatchStopButton
    action: onClick

  mainFlow:
    - step: 1
      description: 计算可停止账号
      component: AccountTableToolbar
      action:
        method: getOnlineSelectedIds
      onDone: step_2

    - step: 2
      description: 显示确认框
      component: ConfirmModal
      action:
        method: confirm
        props:
          title: 确认批量停止
          content: 即将停止选中的 {onlineCount}个在线账号
          okText: 确认停止
          cancelText: 取消

    - step: 3
      description: 等待用户确认
      type: interactive
      waitFor: confirm | cancel

    - step: 4a
      description: 用户确认
      condition: user_action == confirm
      parallel:
        - name: 调用 POST /api/v1/accounts/batch/stop
          api:
            method: POST
            url: /api/v1/accounts/batch/stop
            request:
              ids: { onlineIds }
        - name: 关闭确认框
          component: ConfirmModal
          action:
            method: close
      onSuccess: step_5
      onFail: step_6

    - step: 4b
      description: 用户取消
      condition: user_action == cancel
      name: 关闭确认框
      component: ConfirmModal
      action:
        method: close

    - step: 5
      description: 批量停止成功
      parallel:
        - name: 清空选中
          component: AccountTable
          action:
            method: clearSelection
        - name: 刷新列表
          component: AccountTable
          action:
            method: reload
        - name: 显示成功提示
          component: Message
          action:
            method: success
            props:
              content: 已批量停止{onlineCount}个账号

    - step: 6
      description: 批量停止失败
      component: Message
      action:
        method: error
        props:
          content: { error.message }

