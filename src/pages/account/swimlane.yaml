# 账号列表 - 列表交互
interaction:
  type: list
  name: 账号列表
  trigger:
    component: AccountTable
    action: onMount

  mainFlow:
    - step: 1
      description: 加载账号列表
      parallel:
        - name: 调用 GET /api/v1/accounts
          api:
            method: GET
            url: /api/v1/accounts
            params:
              page: 1
              pageSize: 10
              keyword: ''
              platform: ''
              accountStatus: ''
        - name: 显示 loading
          component: AccountTable
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_2
      onFail: step_3

    - step: 2
      description: 渲染账号列表
      component: AccountTable
      action:
        method: setData
        props:
          dataSource: { response.list }
      onDone: step_4

    - step: 3
      description: 加载失败
      component: AccountTable
      action:
        method: setError
        props:
          error: { error.message }

    - step: 4
      description: 渲染分页
      component: Pagination
      action:
        method: setPagination
        props:
          current: 1
          pageSize: 10
          total: { response.total }

---
# 账号停止 - 确认交互
stop_interaction:
  type: confirm
  name: 停止账号确认
  trigger:
    component: StopButton
    action: onClick

  mainFlow:
    - step: 1
      description: 显示确认框
      component: ConfirmModal
      action:
        method: confirm
        props:
          title: 确认停止
          content: 即将停止该账号，停止后该账号将无法承载任务
          okText: 确认停止
          cancelText: 取消

    - step: 2
      description: 等待用户确认
      type: interactive
      waitFor: confirm | cancel

    - step: 3a
      description: 用户确认停止
      condition: user_action == confirm
      parallel:
        - name: 调用 POST /api/v1/accounts/{id}/stop
          api:
            method: POST
            url: /api/v1/accounts/{id}/stop
        - name: 关闭确认框
          component: ConfirmModal
          action:
            method: close
      onSuccess: step_4
      onFail: step_5

    - step: 3b
      description: 用户取消
      condition: user_action == cancel
      name: 关闭确认框
      component: ConfirmModal
      action:
        method: close

    - step: 4
      description: 停止成功
      parallel:
        - name: 刷新列表
          component: AccountTable
          action:
            method: reload
        - name: 显示成功提示
          component: Message
          action:
            method: success
            props:
              content: 已停止该账号

    - step: 5
      description: 停止失败
      component: Message
      action:
        method: error
        props:
          content: { error.message }

---
# 账号启动 - 状态切换
start_interaction:
  type: state
  name: 启动账号
  trigger:
