---
# 工具栏按钮状态 - 状态切换
toolbar_button_state:
  type: state
  name: 工具栏批量操作按钮状态

  mainFlow:
    - step: 1
      description: 用户勾选账号
      component: AccountTable
      action:
        method: onSelectionChange
      onDone: step_2

    - step: 2
      description: 计算按钮启用状态
      component: AccountTableToolbar
      action:
        method: updateButtonState
      onDone: step_3

    - step: 3
      description: 更新按钮禁用状态
      component: AccountTableToolbar
      action:
        method: setDisabled
        props:
          batchStop: { hasOnlineSelected }
          batchStart: { hasStoppedSelected }
          batchDelete: { hasStoppedSelected }

states:
  - name: selected_row_keys
    type: string[]
    default: []

  - name: selected_rows
    type: AccountResponse[]
    default: []

  - name: has_online_selected
    type: boolean
    default: false

  - name: has_stopped_selected
    type: boolean
    default: false

  - name: online_ids
    type: string[]
    default: []

  - name: stopped_ids
    type: string[]
    default: []
