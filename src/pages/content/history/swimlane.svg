<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750">
  <title>历史发布记录 - 交互泳道图</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrowhead-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/>
    </marker>
    <marker id="arrowhead-async" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1890ff"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="750" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="500" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">历史发布记录 - 交互泳道图</text>

  <!-- 泳道 -->
  <!-- 用户 -->
  <rect x="10" y="45" width="140" height="695" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="80" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#1890ff">用户</text>

  <!-- 前端组件 -->
  <rect x="160" y="45" width="280" height="695" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="300" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#52c41a">前端组件</text>

  <!-- 后端API -->
  <rect x="450" y="45" width="240" height="695" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="570" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#fa8c16">后端 API</text>

  <!-- 数据库 -->
  <rect x="700" y="45" width="290" height="695" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="845" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#722ed1">数据库</text>

  <!-- ========== 历史列表加载 ========== -->
  <line x1="10" y1="90" x2="990" y2="90" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="85" font-size="11" fill="#8c8c8c">历史发布记录列表</text>

  <!-- 步骤1: 加载历史列表 -->
  <circle cx="80" cy="120" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="80" y="125" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="180" y="105" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="125" text-anchor="middle" font-size="10">HistoryTable</text>

  <line x1="98" y1="120" x2="180" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤1.1: 调用API -->
  <circle cx="80" cy="165" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="80" y="170" text-anchor="middle" font-size="10" fill="white">1.1</text>

  <rect x="470" y="150" width="160" height="30" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="170" text-anchor="middle" font-size="10">GET /api/v1/content/publish/records</text>

  <line x1="240" y1="120" x2="300" y2="120" stroke="#666" stroke-width="1.5"/>
  <line x1="300" y1="120" x2="300" y2="165" stroke="#666" stroke-width="1.5"/>
  <line x1="300" y1="165" x2="470" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 数据库查询 -->
  <rect x="720" y="150" width="140" height="30" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="790" y="170" text-anchor="middle" font-size="10">查询发布记录</text>

  <line x1="630" y1="165" x2="720" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤1.2: 显示loading -->
  <rect x="180" y="185" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="205" text-anchor="middle" font-size="10">HistoryTable.setLoading</text>

  <line x1="240" y1="135" x2="240" y2="185" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 渲染列表 -->
  <circle cx="80" cy="240" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="80" y="245" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="180" y="225" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="245" text-anchor="middle" font-size="10">HistoryTable.setData</text>

  <line x1="790" y1="180" x2="450" y2="180" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="450" y1="180" x2="450" y2="240" stroke="#52c41a" stroke-width="1.5"/>
  <line x1="450" y1="240" x2="180" y2="240" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤4: 渲染分页 -->
  <circle cx="80" cy="285" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="80" y="290" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="180" y="270" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="290" text-anchor="middle" font-size="10">Pagination.setPagination</text>

  <line x1="240" y1="255" x2="240" y2="270" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 筛选查询 ========== -->
  <line x1="10" y1="340" x2="990" y2="340" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="335" font-size="11" fill="#8c8c8c">筛选查询</text>

  <!-- 筛选步骤1: 获取筛选条件 -->
  <circle cx="80" cy="370" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="80" y="375" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="180" y="355" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="375" text-anchor="middle" font-size="10">FilterCard.getFilters</text>

  <line x1="98" y1="370" x2="180" y2="370" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 筛选步骤2: 调用API -->
  <circle cx="80" cy="415" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="80" y="420" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="470" y="400" width="160" height="30" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="420" text-anchor="middle" font-size="10">GET /api/v1/content/publish/records</text>

  <line x1="240" y1="370" x2="300" y2="370" stroke="#666" stroke-width="1.5"/>
  <line x1="300" y1="370" x2="300" y2="415" stroke="#666" stroke-width="1.5"/>
  <line x1="300" y1="415" x2="470" y2="415" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 筛选步骤3: 更新列表 -->
  <circle cx="80" cy="460" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="80" y="465" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="180" y="445" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="465" text-anchor="middle" font-size="10">HistoryTable.setData</text>

  <line x1="630" y1="430" x2="450" y2="430" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <line x1="450" y1="430" x2="450" y2="460" stroke="#52c41a" stroke-width="1.5"/>
  <line x1="450" y1="460" x2="180" y2="460" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤3.2: 重置分页 -->
  <rect x="180" y="485" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="505" text-anchor="middle" font-size="10">Pagination.setCurrent(1)</text>

  <line x1="240" y1="475" x2="240" y2="485" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 查看详情 ========== -->
  <line x1="10" y1="550" x2="990" y2="550" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="545" font-size="11" fill="#8c8c8c">查看详情</text>

  <!-- 详情步骤1: 获取记录ID -->
  <circle cx="80" cy="580" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="80" y="585" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="180" y="565" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="585" text-anchor="middle" font-size="10">HistoryTable.getRecordId</text>

  <line x1="98" y1="580" x2="180" y2="580" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 详情步骤2: 跳转详情页 -->
  <circle cx="80" cy="625" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="80" y="630" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="180" y="610" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="630" text-anchor="middle" font-size="10">router.push(/content/detail)</text>

  <line x1="240" y1="595" x2="240" y2="610" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 重新发布入口 ========== -->
  <line x1="10" y1="680" x2="990" y2="680" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="675" font-size="11" fill="#8c8c8c">重新发布入口</text>

  <!-- republish步骤1 -->
  <circle cx="80" cy="710" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="80" y="715" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="180" y="695" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="715" text-anchor="middle" font-size="10">HistoryTable.getRecordId</text>

  <line x1="98" y1="710" x2="180" y2="710" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- republish步骤2: 跳转重新发布页 -->
  <rect x="180" y="730" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="240" y="750" text-anchor="middle" font-size="10">router.push(/content/republish)</text>

  <line x1="240" y1="725" x2="240" y2="730" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 图例 ========== -->
  <rect x="700" y="620" width="280" height="110" fill="#fafafa" stroke="#d9d9d9" rx="5"/>
  <text x="710" y="638" font-size="10" font-weight="bold">图例</text>
  <circle cx="730" cy="660" r="8" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="745" y="663" font-size="9">用户触发</text>
  <circle cx="730" cy="685" r="8" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="745" y="688" font-size="9">成功</text>
  <circle cx="730" cy="710" r="8" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="745" y="713" font-size="9">失败</text>
  <line x1="830" y1="660" x2="860" y2="660" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="870" y="663" font-size="9">正常流程</text>
  <line x1="830" y1="685" x2="860" y2="685" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <text x="870" y="688" font-size="9">成功流程</text>
</svg>