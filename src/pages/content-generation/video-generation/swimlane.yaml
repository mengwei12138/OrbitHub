  - name: ContentConfigForm
    description: 内容配置表单
    path: src/pages/content-generation/video-generation/components/ContentConfigForm/index.tsx
    figmaAnchor: "3060-1861"

  - name: GenerateButton
    description: 生成按钮
    path: src/pages/content-generation/video-generation/components/GenerateButton/index.tsx
    figmaAnchor: "3060-1861"

  - name: GeneratingModal
    description: 生成中弹窗
    path: src/pages/content-generation/video-generation/components/GeneratingModal/index.tsx
