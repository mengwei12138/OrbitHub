<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200">
  <title>账号详情页 - 交互泳道图</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrowhead-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="1200" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="500" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">账号详情页 - 交互泳道图</text>

  <!-- 泳道 -->
  <!-- 用户 -->
  <rect x="10" y="45" width="130" height="1145" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="75" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#1890ff">用户</text>

  <!-- 前端组件 -->
  <rect x="150" y="45" width="280" height="1145" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="290" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#52c41a">前端组件</text>

  <!-- 后端API -->
  <rect x="440" y="45" width="240" height="1145" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="560" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#fa8c16">后端 API</text>

  <!-- 状态管理 -->
  <rect x="690" y="45" width="300" height="1145" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="840" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#722ed1">状态管理</text>

  <!-- ========== A. 账号详情页加载 ========== -->
  <line x1="10" y1="90" x2="990" y2="90" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="85" font-size="11" fill="#8c8c8c">A. 账号详情页加载</text>

  <!-- 步骤1: 获取账号ID -->
  <circle cx="75" cy="120" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="125" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="105" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="125" text-anchor="middle" font-size="10">AccountDetailPage</text>

  <line x1="93" y1="120" x2="170" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 并发加载数据 -->
  <circle cx="75" cy="165" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="170" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="150" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="170" text-anchor="middle" font-size="10">并发请求</text>

  <line x1="230" y1="135" x2="230" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="460" y="120" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="137" text-anchor="middle" font-size="9">GET /accounts/{id}</text>

  <rect x="460" y="150" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="167" text-anchor="middle" font-size="9">GET /accounts/{id}/today-metrics</text>

  <rect x="460" y="180" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="197" text-anchor="middle" font-size="9">GET /accounts/{id}/trend</text>

  <rect x="460" y="210" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="227" text-anchor="middle" font-size="9">GET /accounts/{id}/contents</text>

  <line x1="290" y1="165" x2="460" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 渲染基本信息 -->
  <circle cx="75" cy="265" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="270" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="250" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="270" text-anchor="middle" font-size="10">AccountBasicInfo</text>

  <rect x="710" y="250" width="140" height="25" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="780" y="267" text-anchor="middle" font-size="9">nickname, platform, fans</text>

  <line x1="550" y1="240" x2="380" y2="265" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤4: 渲染今日指标 -->
  <circle cx="75" cy="310" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="315" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="170" y="295" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="315" text-anchor="middle" font-size="10">TodayMetrics</text>

  <rect x="710" y="295" width="140" height="25" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="780" y="312" text-anchor="middle" font-size="9">play, like, comment, share</text>

  <line x1="230" y1="280" x2="230" y2="295" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤5: 渲染趋势图 -->
  <circle cx="75" cy="355" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="360" text-anchor="middle" font-size="10" fill="white">5</text>

  <rect x="170" y="340" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="360" text-anchor="middle" font-size="10">TrendChart</text>

  <line x1="230" y1="325" x2="230" y2="340" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤6: 渲染内容列表 -->
  <circle cx="75" cy="400" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="405" text-anchor="middle" font-size="10" fill="white">6</text>

  <rect x="170" y="385" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="405" text-anchor="middle" font-size="10">ContentList</text>

  <line x1="230" y1="370" x2="230" y2="385" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤7: 渲染分页 -->
  <circle cx="75" cy="445" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="450" text-anchor="middle" font-size="10" fill="white">7</text>

  <rect x="170" y="430" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="450" text-anchor="middle" font-size="10">Pagination</text>

  <line x1="230" y1="415" x2="230" y2="430" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== B. 返回数据中心 ========== -->
  <line x1="10" y1="510" x2="990" y2="510" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="505" font-size="11" fill="#8c8c8c">B. 返回数据中心</text>

  <!-- 步骤1: 点击返回 -->
  <circle cx="75" cy="540" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="545" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="525" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="545" text-anchor="middle" font-size="10">点击返回</text>

  <line x1="93" y1="540" x2="170" y2="540" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 读取状态 -->
  <circle cx="75" cy="585" r="18" fill="#d9d7fb" stroke="#722ed1" stroke-width="2"/>
  <text x="75" y="590" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="570" width="120" height="30" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="2"/>
  <text x="230" y="590" text-anchor="middle" font-size="10">sessionStorage</text>

  <line x1="230" y1="555" x2="230" y2="570" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="710" y="570" width="140" height="25" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="780" y="587" text-anchor="middle" font-size="9">timeRange, platform, page</text>

  <!-- 步骤3: 跳转主页 -->
  <circle cx="75" cy="630" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="635" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="615" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="635" text-anchor="middle" font-size="10">router.push</text>

  <line x1="230" y1="600" x2="230" y2="615" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <text x="320" y="635" font-size="10" fill="#666">→ /datacenter</text>

  <!-- 步骤4: 恢复状态 -->
  <circle cx="75" cy="675" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="680" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="170" y="660" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="680" text-anchor="middle" font-size="10">restoreState</text>

  <line x1="230" y1="645" x2="230" y2="660" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== C. 内容列表分页 ========== -->
  <line x1="10" y1="750" x2="990" y2="750" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="745" font-size="11" fill="#8c8c8c">C. 内容列表分页</text>

  <!-- 步骤1: 点击分页 -->
  <circle cx="75" cy="780" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="785" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="765" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="785" text-anchor="middle" font-size="10">点击分页</text>

  <line x1="93" y1="780" x2="170" y2="780" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 显示loading -->
  <circle cx="75" cy="825" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="830" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="810" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="830" text-anchor="middle" font-size="10">setLoading</text>

  <line x1="230" y1="795" x2="230" y2="810" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 加载数据 -->
  <circle cx="75" cy="870" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="875" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="855" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="875" text-anchor="middle" font-size="10">reload</text>

  <line x1="230" y1="840" x2="230" y2="855" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="460" y="855" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="872" text-anchor="middle" font-size="9">GET /accounts/{id}/contents</text>

  <line x1="290" y1="870" x2="460" y2="870" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤4: 渲染列表 -->
  <circle cx="75" cy="915" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="920" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="170" y="900" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="920" text-anchor="middle" font-size="10">setData</text>

  <line x1="550" y1="885" x2="380" y2="915" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== D. 账号已删除 ========== -->
  <line x1="10" y1="990" x2="990" y2="990" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="985" font-size="11" fill="#8c8c8c">D. 账号已删除</text>

  <!-- 步骤1: 账号不存在 -->
  <circle cx="75" cy="1020" r="18" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="75" y="1025" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="1005" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="1025" text-anchor="middle" font-size="10">账号不存在</text>

  <line x1="93" y1="1020" x2="170" y2="1020" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 显示404 -->
  <circle cx="75" cy="1065" r="18" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="75" y="1070" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="1050" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="1070" text-anchor="middle" font-size="10">show404</text>

  <line x1="230" y1="1035" x2="230" y2="1050" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 返回按钮 -->
  <circle cx="75" cy="1110" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="1115" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="1095" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="1115" text-anchor="middle" font-size="10">返回数据中心</text>

  <line x1="230" y1="1080" x2="230" y2="1095" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 图例 ========== -->
  <rect x="10" y="1130" width="980" height="55" fill="#fafafa" stroke="#d9d9d9" rx="5"/>
  <text x="25" y="1148" font-size="10" font-weight="bold">图例</text>
  <circle cx="50" cy="1168" r="8" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="65" y="1172" font-size="9">步骤</text>
  <line x1="110" y1="1168" x2="140" y2="1168" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="150" y="1172" font-size="9">正常流程</text>
  <line x1="210" y1="1168" x2="240" y2="1168" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <text x="250" y="1172" font-size="9">成功流程</text>
  <line x1="310" y1="1168" x2="340" y2="1168" stroke="#ff4d4f" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>
  <text x="350" y="1172" font-size="9">失败/异常</text>
</svg>