# 数据中心 - 交互逻辑定义
# 本文件定义数据中心主页的交互逻辑
# OpenAPI 文件暂无，API 路径为占位符，待后端提供后补充

# =============================================
# 1. 数据中心主页 - 列表交互
# =============================================
---
interaction:
  type: list
  name: 数据中心主页加载
  trigger:
    component: DataCentrePage
    action: onMount

  mainFlow:
    - step: 1
      description: 加载初始数据
      parallel:
        - name: 调用获取预警列表接口
          api:
            method: GET
            url: /api/v1/datacenter/warnings
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
              page: 1
              pageSize: 3
        - name: 调用获取核心指标接口
          api:
            method: GET
            url: /api/v1/datacenter/metrics/summary
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
        - name: 显示 loading
          component: DataCentrePage
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_2
      onFail: show_error

    - step: 2
      description: 渲染预警区
      component: WarningPanel
      action:
        method: setData
        props:
          warnings: '{response.warnings}'
          totalCount: '{response.totalCount}'
          unreadCount: '{response.unreadCount}'
          abnormalAccountCount: '{response.abnormalAccountCount}'
      onDone: step_3

    - step: 3
      description: 渲染六宫格指标卡（环比说明文案随全局时间筛选：今日较昨日、近7天与前7天对比、近30天与前30天对比、今年与去年同期）
      component: MetricsGrid
      action:
        method: setData
        props:
          totalPlayCount: '{response.metrics.totalPlayCount}'
          totalLikeCount: '{response.metrics.totalLikeCount}'
          totalCommentCount: '{response.metrics.totalCommentCount}'
          totalShareCount: '{response.metrics.totalShareCount}'
          newFansCount: '{response.metrics.newFansCount}'
          privateMessageCount: '{response.metrics.privateMessageCount}'
      onDone: step_4

    - step: 4
      description: 加载默认账号的趋势图数据
      parallel:
        - name: 获取上次选中的账号或第一个账号
          component: TrendChart
          action:
            method: getDefaultAccount
        - name: 调用趋势图数据接口
          api:
            method: GET
            url: /api/v1/datacenter/accounts/{accountId}/trend
            params:
              timeRange: '{timeRange}'
              granularity: '{granularity}'
      onSuccess: step_5
      onFail: step_5

    - step: 5
      description: 渲染趋势图
      component: TrendChart
      action:
        method: setData
        props:
          data: '{response.trendData}'
          accountId: '{accountId}'
      onDone: step_6

    - step: 6
      description: 加载内容表现列表
      async: true
      parallel:
        - name: 调用内容列表接口
          api:
            method: GET
            url: /api/v1/datacenter/contents
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
              contentType: '{contentType}'
              sortBy: '{sortBy}'
              page: 1
              pageSize: 10
        - name: 显示 loading
          component: ContentTable
          action:
            method: setLoading
            props:
              loading: true
      onSuccess: step_7
      onFail: show_error

    - step: 7
      description: 渲染内容表现列表（播放量列≥1万显示X.X万，≥1亿显示X.X亿）
      component: ContentTable
      action:
        method: setData
        props:
          dataSource: '{response.list}'
          total: '{response.total}'
      onDone: step_8

    - step: 8
      description: 渲染分页器
      component: ContentTable
      action:
        method: setPagination
        props:
          current: 1
          pageSize: 10
          total: '{response.total}'

    - step: 9
      description: 停止 loading
      component: DataCentrePage
      action:
        method: setLoading
        props:
          loading: false

  randomEvents:
    - trigger: 用户切换时间筛选
      name: 刷新全页数据
      component: DataCentrePage
      action:
        method: reloadWithFilter
      params:
        timeRange: '{timeRange}'
        platform: '{platform}'

    - trigger: 用户切换平台筛选
      name: 刷新全页数据
      component: DataCentrePage
      action:
        method: reloadWithFilter
      params:
        timeRange: '{timeRange}'
        platform: '{platform}'

    - trigger: 用户点击刷新按钮
      name: 全页面刷新
      component: DataCentrePage
      action:
        method: onRefreshClick

    - trigger: 用户切换内容排序
      condition: debounceComplete == true
      name: 刷新内容列表
      component: ContentTable
      action:
        method: reload
      params:
        sortBy: '{sortBy}'
        page: 1

    - trigger: 用户切换内容类型筛选
      condition: debounceComplete == true
      name: 刷新内容列表
      component: ContentTable
      action:
        method: reload
      params:
        contentType: '{contentType}'
        page: 1

    - trigger: 用户切换分页
      name: 加载指定页内容
      component: ContentTable
      action:
        method: reload
      params:
        page: '{pagination.current}'
        pageSize: '{pagination.pageSize}'

    - trigger: 用户点击预警查看详情
      name: 跳转账号详情页
      component: WarningPanel
      action:
        method: onViewDetail
      params:
        warningId: '{warning.id}'
        accountId: '{warning.accountId}'

    - trigger: 用户忽略预警
      name: 忽略预警并刷新
      component: WarningPanel
      action:
        method: onIgnoreWarning
      params:
        warningId: '{warning.id}'
      onSuccess: reload_warnings
      onFail: show_error

    - trigger: 用户点击去处理
      name: 跳转对应处理页面
      component: WarningPanel
      action:
        method: onHandleWarning
      params:
        warningId: '{warning.id}'
        handleType: '{warning.handleType}'

    - trigger: 用户点击查看全部预警
      name: 跳转预警详情页
      component: router
      action:
        method: push
        props:
          path: /datacenter/warnings

    - trigger: 用户切换趋势图账号
      name: 加载新账号趋势数据
      component: TrendChart
      action:
        method: onAccountChange
      params:
        accountId: '{accountId}'
      onSuccess: update_trend_chart
      onFail: show_error

    - trigger: 用户切换趋势图粒度
      name: 加载新粒度趋势数据
      component: TrendChart
      action:
        method: onGranularityChange
      params:
        granularity: '{granularity}'
      onSuccess: update_trend_chart
      onFail: show_error

    - trigger: 用户点击内容列表账号名称
      name: 跳转账号详情页
      component: ContentTable
      action:
        method: navigate
      params:
        path: '/datacenter/account/{accountId}?from=datacenter'
        accountId: '{content.accountId}'

    - trigger: Token 过期
      condition: response.code == 401
      name: 跳转登录页
      component: router
      action:
        method: push
        props:
          path: /login

    - trigger: 网络错误
      condition: response.code >= 500
      name: 显示服务异常提示
      component: Message
      action:
        method: error
        props:
          content: 服务异常，请稍后重试

  states:
    - name: time_range
      type: string
      default: TODAY
      enum: [TODAY, LAST_7_DAYS, LAST_30_DAYS, THIS_YEAR]
    - name: platform
      type: string
      default: ALL
      enum: [ALL, DOUYIN, XIAOHONGSHU]
    - name: granularity
      type: string
      default: HOUR
      enum: [HOUR, DAY, WEEK, MONTH]
    - name: content_type
      type: string
      default: ALL
      enum: [ALL, VIDEO, IMAGE]
    - name: sort_by
      type: string
      default: PLAY_COUNT
      enum: [PLAY_COUNT, LIKE_COUNT, COMMENT_COUNT]
    - name: loading
      type: boolean
      default: false
    - name: pagination
      type: object
      default:
        current: 1
        pageSize: 10
        total: 0
    - name: last_refresh_time
      type: string
      default: ''
    - name: selected_account_id
      type: string
      default: ''
---
# 2. 数据中心主页 - 手动刷新
interaction:
  type: async
  name: 手动刷新
  trigger:
    component: RefreshButton
    action: onClick

  mainFlow:
    - step: 1
      description: 按钮进入 loading 状态
      parallel:
        - name: 按钮显示 loading
          component: RefreshButton
          action:
            method: setLoading
            props:
              loading: true
              text: 刷新中...
              disabled: true
        - name: 趋势图显示蒙层
          component: TrendChart
          action:
            method: showOverlay
            props:
              loading: true
      onDone: step_2

    - step: 2
      description: 发起刷新请求
      async: true
      parallel:
        - name: 调用预警列表接口
          api:
            method: GET
            url: /api/v1/datacenter/warnings
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
              page: 1
              pageSize: 3
        - name: 调用核心指标接口
          api:
            method: GET
            url: /api/v1/datacenter/metrics/summary
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
        - name: 调用趋势图数据接口
          api:
            method: GET
            url: /api/v1/datacenter/accounts/{selectedAccountId}/trend
            params:
              timeRange: '{timeRange}'
              granularity: '{granularity}'
        - name: 调用内容列表接口
          api:
            method: GET
            url: /api/v1/datacenter/contents
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
              contentType: '{contentType}'
              sortBy: '{sortBy}'
              page: '{pagination.current}'
              pageSize: '{pagination.pageSize}'
      onSuccess: step_3
      onFail: step_4

    - step: 3
      description: 刷新成功
      parallel:
        - name: 更新预警数据
          component: WarningPanel
          action:
            method: setData
            props:
              warnings: '{response.warnings}'
              totalCount: '{response.totalCount}'
              unreadCount: '{response.unreadCount}'
              abnormalAccountCount: '{response.abnormalAccountCount}'
        - name: 更新指标数据
          component: MetricsGrid
          action:
            method: setData
            props:
              data: '{response.metrics}'
        - name: 更新趋势图
          component: TrendChart
          action:
            method: setData
            props:
              data: '{response.trendData}'
        - name: 更新内容列表
          component: ContentTable
          action:
            method: setData
            props:
              dataSource: '{response.contents.list}'
              total: '{response.contents.total}'
        - name: 更新刷新时间
          component: RefreshButton
          action:
            method: updateLastRefreshTime
        - name: 移除趋势图蒙层
          component: TrendChart
          action:
            method: hideOverlay
      onDone: step_5

    - step: 4
      description: 刷新失败
      parallel:
        - name: 显示错误提示
          component: Message
          action:
            method: error
            props:
              content: 刷新失败，请稍后重试
        - name: 移除趋势图蒙层
          component: TrendChart
          action:
            method: hideOverlay
        - name: 保留旧数据
      onDone: step_5

    - step: 5
      description: 按钮恢复可用状态
      component: RefreshButton
      action:
        method: setLoading
        props:
          loading: false
          text: 刷新
          disabled: false

  randomEvents:
    - trigger: Token 过期
      condition: response.code == 401
      name: 跳转登录页
      component: router
      action:
        method: push
        props:
          path: /login

  states:
    - name: is_refreshing
      type: boolean
      default: false

---
# 3. 数据中心主页 - 自动刷新
interaction:
  type: async
  name: 自动刷新
  trigger:
    component: DataCentrePage
    action: onAutoRefresh

  mainFlow:
    - step: 1
      description: 检查页面可见性
      component: DataCentrePage
      action:
        method: checkVisibility
      onDone: step_2

    - step: 2
      description: 页面不可见时暂停
      condition: isVisible == false
      name: 暂停自动刷新
      component: AutoRefreshTimer
      action:
        method: pause

    - step: 3
      description: 页面可见时执行刷新
      condition: isVisible == true
      async: true
      parallel:
        - name: 调用预警列表接口
          api:
            method: GET
            url: /api/v1/datacenter/warnings
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
              page: 1
              pageSize: 3
        - name: 调用核心指标接口
          api:
            method: GET
            url: /api/v1/datacenter/metrics/summary
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
      onSuccess: step_4
      onFail: skip

    - step: 4
      description: 更新数据
      parallel:
        - name: 更新预警数据
          component: WarningPanel
          action:
            method: setData
            props:
              warnings: '{response.warnings}'
              totalCount: '{response.totalCount}'
              unreadCount: '{response.unreadCount}'
              abnormalAccountCount: '{response.abnormalAccountCount}'
        - name: 更新指标数据
          component: MetricsGrid
          action:
            method: setData
            props:
              data: '{response.metrics}'
        - name: 更新刷新时间
          component: RefreshButton
          action:
            method: updateLastRefreshTime

  randomEvents:
    - trigger: 页面隐藏
      name: 暂停定时器
      component: AutoRefreshTimer
      action:
        method: pause

    - trigger: 页面重新可见
      name: 立即刷新并重启定时器
      component: DataCentrePage
      action:
        method: onVisibilityChange
      params:
        visible: true

    - trigger: 用户正在进行手动操作
      name: 暂停本次自动刷新
      component: AutoRefreshTimer
      action:
        method: debounce
      params:
        delay: 300

  states:
    - name: auto_refresh_interval
      type: number
      default: 300000
    - name: is_visible
      type: boolean
      default: true
    - name: is_paused
      type: boolean
      default: false

---
# 4. 数据中心主页 - 趋势图账号切换
interaction:
  type: state
  name: 趋势图账号切换
  trigger:
    component: TrendChart
    action: onAccountSelect

  mainFlow:
    - step: 1
      description: 保存选中的账号到 localStorage
      component: TrendChart
      action:
        method: saveSelectedAccount
      params:
        accountId: '{accountId}'
      onDone: step_2

    - step: 2
      description: 显示 loading 骨架屏
      component: TrendChart
      action:
        method: showSkeleton
      onDone: step_3

    - step: 3
      description: 加载新账号趋势数据
      async: true
      api:
        method: GET
        url: /api/v1/datacenter/accounts/{accountId}/trend
        params:
          timeRange: '{timeRange}'
          granularity: '{granularity}'
      onSuccess: step_4
      onFail: step_5

    - step: 4
      description: 渲染新账号趋势图
      component: TrendChart
      action:
        method: setData
        props:
          data: '{response.trendData}'
          accountId: '{accountId}'

    - step: 5
      description: 加载失败，显示错误
      component: TrendChart
      action:
        method: setError
        props:
          error: '{error.message}'

  states:
    - name: selected_account_id
      type: string
      default: ''

---
# 5. 数据中心主页 - 内容列表排序筛选
interaction:
  type: list
  name: 内容列表排序筛选
  trigger:
    component: ContentTable
    action: onFilterChange

  mainFlow:
    - step: 1
      description: 等待防抖
      component: ContentTable
      action:
        method: debounce
      params:
        delay: 300
      onDone: step_2

    - step: 2
      description: 重置页码并加载数据
      parallel:
        - name: 重置页码为1
          component: ContentTable
          action:
            method: setPagination
            props:
              current: 1
        - name: 显示 loading
          component: ContentTable
          action:
            method: setLoading
            props:
              loading: true
        - name: 调用内容列表接口
          api:
            method: GET
            url: /api/v1/datacenter/contents
            params:
              timeRange: '{timeRange}'
              platform: '{platform}'
              contentType: '{contentType}'
              sortBy: '{sortBy}'
              page: 1
              pageSize: '{pageSize}'
      onSuccess: step_3
      onFail: show_error

    - step: 3
      description: 渲染内容列表
      component: ContentTable
      action:
        method: setData
        props:
          dataSource: '{response.list}'
          total: '{response.total}'

  randomEvents:
    - trigger: 用户快速切换筛选
      name: 取消上次请求
      component: ContentTable
      action:
        method: cancelRequest

  states:
    - name: content_type
      type: string
      default: ALL
    - name: sort_by
      type: string
      default: PLAY_COUNT
    - name: debounce_timer
      type: number
      default: null
