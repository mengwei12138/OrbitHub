<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500">
  <title>预警详情页 - 交互泳道图</title>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrowhead-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="1500" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="500" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">预警详情页 - 交互泳道图</text>

  <!-- 泳道 -->
  <!-- 用户 -->
  <rect x="10" y="45" width="130" height="1445" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="75" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#1890ff">用户</text>

  <!-- 前端组件 -->
  <rect x="150" y="45" width="280" height="1445" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="290" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#52c41a">前端组件</text>

  <!-- 后端API -->
  <rect x="440" y="45" width="240" height="1445" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="560" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#fa8c16">后端 API</text>

  <!-- 状态管理 -->
  <rect x="690" y="45" width="300" height="1445" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="840" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#722ed1">状态管理</text>

  <!-- ========== A. 页面加载 ========== -->
  <line x1="10" y1="90" x2="990" y2="90" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="85" font-size="11" fill="#8c8c8c">A. 预警详情页加载</text>

  <!-- 步骤1: 页面挂载 -->
  <circle cx="75" cy="120" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="125" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="105" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="125" text-anchor="middle" font-size="10">WarningListPage</text>

  <line x1="93" y1="120" x2="170" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 并发加载 -->
  <circle cx="75" cy="165" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="170" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="150" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="170" text-anchor="middle" font-size="10">并发请求</text>

  <line x1="230" y1="135" x2="230" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="460" y="120" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="137" text-anchor="middle" font-size="9">GET /warnings/stats</text>

  <rect x="460" y="150" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="167" text-anchor="middle" font-size="9">GET /warnings</text>

  <line x1="290" y1="165" x2="460" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 渲染统计 -->
  <circle cx="75" cy="225" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="230" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="210" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="230" text-anchor="middle" font-size="10">WarningStats</text>

  <rect x="710" y="210" width="140" height="25" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="1.5"/>
  <text x="780" y="227" text-anchor="middle" font-size="9">total, unread, abnormal</text>

  <line x1="550" y1="180" x2="380" y2="225" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤4: 渲染列表 -->
  <circle cx="75" cy="275" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="280" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="170" y="260" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="280" text-anchor="middle" font-size="10">WarningList</text>

  <line x1="230" y1="240" x2="230" y2="260" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤5: 渲染分页 -->
  <circle cx="75" cy="325" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="330" text-anchor="middle" font-size="10" fill="white">5</text>

  <rect x="170" y="310" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="330" text-anchor="middle" font-size="10">Pagination</text>

  <line x1="230" y1="290" x2="230" y2="310" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== B. 全部标记已读 ========== -->
  <line x1="10" y1="390" x2="990" y2="390" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="385" font-size="11" fill="#8c8c8c">B. 全部标记已读</text>

  <!-- 步骤1: 点击标记已读 -->
  <circle cx="75" cy="420" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="425" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="405" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="425" text-anchor="middle" font-size="10">点击标记已读</text>

  <line x1="93" y1="420" x2="170" y2="420" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 显示确认框 -->
  <circle cx="75" cy="465" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="470" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="450" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="470" text-anchor="middle" font-size="10">ConfirmModal</text>

  <line x1="230" y1="435" x2="230" y2="450" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 等待确认 -->
  <circle cx="75" cy="510" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="515" text-anchor="middle" font-size="10" fill="white">3</text>

  <polygon points="230,495 265,510 230,525 195,510" fill="#fff" stroke="#1890ff" stroke-width="2"/>
  <text x="230" y="513" text-anchor="middle" font-size="9">确认?</text>

  <line x1="230" y1="480" x2="230" y2="495" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 取消路径 -->
  <line x1="195" y1="510" x2="75" y2="510" stroke="#666" stroke-width="1.5"/>
  <text x="130" y="505" font-size="9" fill="#8c8c8c">取消</text>

  <!-- 步骤4: 确认标记已读 -->
  <circle cx="75" cy="555" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="560" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="460" y="540" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="557" text-anchor="middle" font-size="9">POST /warnings/mark-all-read</text>

  <line x1="265" y1="510" x2="265" y2="540" stroke="#666" stroke-width="1.5"/>
  <line x1="265" y1="540" x2="460" y2="540" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤5: 刷新 -->
  <circle cx="75" cy="600" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="605" text-anchor="middle" font-size="10" fill="white">5</text>

  <rect x="170" y="585" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="605" text-anchor="middle" font-size="10">reload</text>

  <line x1="550" y1="570" x2="380" y2="600" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== C. 清空已忽略项 ========== -->
  <line x1="10" y1="670" x2="990" y2="670" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="665" font-size="11" fill="#8c8c8c">C. 清空已忽略项</text>

  <!-- 步骤1: 点击清空 -->
  <circle cx="75" cy="700" r="18" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="75" y="705" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="685" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="705" text-anchor="middle" font-size="10">点击清空已忽略</text>

  <line x1="93" y1="700" x2="170" y2="700" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 显示危险确认框 -->
  <circle cx="75" cy="745" r="18" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="75" y="750" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="730" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="750" text-anchor="middle" font-size="10">危险确认弹窗</text>

  <line x1="230" y1="715" x2="230" y2="730" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 等待确认 -->
  <circle cx="75" cy="790" r="18" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="75" y="795" text-anchor="middle" font-size="10" fill="white">3</text>

  <polygon points="230,775 265,790 230,805 195,790" fill="#fff" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="793" text-anchor="middle" font-size="9">确认?</text>

  <line x1="230" y1="760" x2="230" y2="775" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 取消路径 -->
  <line x1="195" y1="790" x2="75" y2="790" stroke="#666" stroke-width="1.5"/>
  <text x="130" y="785" font-size="9" fill="#8c8c8c">取消</text>

  <!-- 步骤4: 确认删除 -->
  <circle cx="75" cy="835" r="18" fill="#ff4d4f" stroke="#cf1322" stroke-width="2"/>
  <text x="75" y="840" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="460" y="820" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="837" text-anchor="middle" font-size="9">DELETE /warnings/ignored</text>

  <line x1="265" y1="790" x2="265" y2="820" stroke="#666" stroke-width="1.5"/>
  <line x1="265" y1="820" x2="460" y2="820" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤5: 刷新 -->
  <circle cx="75" cy="880" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="885" text-anchor="middle" font-size="10" fill="white">5</text>

  <rect x="170" y="865" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="885" text-anchor="middle" font-size="10">reload</text>

  <line x1="550" y1="850" x2="380" y2="880" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== D. 类型筛选 ========== -->
  <line x1="10" y1="950" x2="990" y2="950" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="945" font-size="11" fill="#8c8c8c">D. 类型筛选</text>

  <!-- 步骤1: 选择类型 -->
  <circle cx="75" cy="980" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="985" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="965" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="985" text-anchor="middle" font-size="10">选择筛选类型</text>

  <line x1="93" y1="980" x2="170" y2="980" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 重置页码 -->
  <circle cx="75" cy="1025" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="1030" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="170" y="1010" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="1030" text-anchor="middle" font-size="10">resetPagination</text>

  <line x1="230" y1="995" x2="230" y2="1010" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 加载数据 -->
  <circle cx="75" cy="1070" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="1075" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="1055" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="1075" text-anchor="middle" font-size="10">reload</text>

  <line x1="230" y1="1040" x2="230" y2="1055" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="460" y="1055" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="1072" text-anchor="middle" font-size="9">GET /warnings?type={type}</text>

  <line x1="290" y1="1070" x2="460" y2="1070" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤4: 渲染 -->
  <circle cx="75" cy="1115" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="1120" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="170" y="1100" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="1120" text-anchor="middle" font-size="10">setData</text>

  <line x1="550" y1="1085" x2="380" y2="1115" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== E. 忽略预警 ========== -->
  <line x1="10" y1="1190" x2="990" y2="1190" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="1185" font-size="11" fill="#8c8c8c">E. 忽略预警</text>

  <!-- 步骤1: 点击忽略 -->
  <circle cx="75" cy="1220" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="1225" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="170" y="1205" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="230" y="1225" text-anchor="middle" font-size="10">点击忽略</text>

  <line x1="93" y1="1220" x2="170" y2="1220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2: 调用接口 -->
  <circle cx="75" cy="1265" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="75" y="1270" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="460" y="1250" width="180" height="25" rx="5" fill="#ffd591" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="550" y="1267" text-anchor="middle" font-size="9">POST /warnings/{id}/ignore</text>

  <line x1="230" y1="1235" x2="230" y2="1250" stroke="#666" stroke-width="1.5"/>
  <line x1="230" y1="1265" x2="460" y2="1265" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3: 检查页码 -->
  <circle cx="75" cy="1310" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="1315" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="170" y="1295" width="120" height="30" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="2"/>
  <text x="230" y="1315" text-anchor="middle" font-size="10">checkPage</text>

  <line x1="550" y1="1280" x2="380" y2="1310" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤4: 刷新 -->
  <circle cx="75" cy="1355" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="75" y="1360" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="170" y="1340" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="230" y="1360" text-anchor="middle" font-size="10">reload</text>

  <line x1="230" y1="1325" x2="230" y2="1340" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== 图例 ========== -->
  <rect x="10" y="1420" width="980" height="55" fill="#fafafa" stroke="#d9d9d9" rx="5"/>
  <text x="25" y="1438" font-size="10" font-weight="bold">图例</text>
  <circle cx="50" cy="1458" r="8" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="65" y="1462" font-size="9">步骤</text>
  <line x1="110" y1="1458" x2="140" y2="1458" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="150" y="1462" font-size="9">正常流程</text>
  <line x1="210" y1="1458" x2="240" y2="1458" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>
  <text x="250" y="1462" font-size="9">成功流程</text>
  <line x1="310" y1="1458" x2="340" y2="1458" stroke="#ff4d4f" stroke-width="1.5" marker-end="url(#arrowhead-error)"/>
  <text x="350" y="1462" font-size="9">失败/危险操作</text>
  <polygon points="440,1448 455,1458 440,1468 425,1458" fill="#fff" stroke="#1890ff" stroke-width="1.5"/>
  <text x="465" y="1462" font-size="9">决策判断</text>
</svg>