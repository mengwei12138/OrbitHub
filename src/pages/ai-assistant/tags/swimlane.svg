  <text x="90" y="215" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="490" y="195" width="160" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="570" y="215" text-anchor="middle" font-size="10">GET /api/tags</text>

  <line x1="260" y1="180" x2="490" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤4: 渲染列表 -->
  <circle cx="90" cy="255" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="260" text-anchor="middle" font-size="10" fill="white">4</text>

  <rect x="200" y="240" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="260" y="260" text-anchor="middle" font-size="10">TagList</text>

  <line x1="570" y1="225" x2="320" y2="255" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- 步骤5: 渲染分页 -->
  <circle cx="90" cy="300" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="305" text-anchor="middle" font-size="10" fill="white">5</text>

  <rect x="200" y="285" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="260" y="305" text-anchor="middle" font-size="10">Pagination</text>

