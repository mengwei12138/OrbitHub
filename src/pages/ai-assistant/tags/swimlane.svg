  <line x1="260" y1="1215" x2="260" y2="1230" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="1290" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="1295" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="200" y="1275" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
