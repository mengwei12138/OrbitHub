  <line x1="10" y1="370" x2="990" y2="370" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="365" font-size="11" fill="#8c8c8c">B. 标签列表筛选</text>

  <circle cx="90" cy="400" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="405" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="200" y="385" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="260" y="405" text-anchor="middle" font-size="10">选择筛选条件</text>

  <line x1="108" y1="400" x2="200" y2="400" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="445" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="90" y="450" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="490" y="430" width="160" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="570" y="450" text-anchor="middle" font-size="10">GET /api/tags</text>

  <line x1="260" y1="415" x2="490" y2="445" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="490" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="495" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="200" y="475" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
