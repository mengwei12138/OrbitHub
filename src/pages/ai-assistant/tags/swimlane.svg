  <rect x="200" y="1465" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="260" y="1485" text-anchor="middle" font-size="10">点击停用/启用</text>

  <line x1="108" y1="1480" x2="200" y2="1480" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="1525" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="90" y="1530" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="490" y="1510" width="160" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="570" y="1530" text-anchor="middle" font-size="10">PUT /api/tags/{id}</text>

  <line x1="260" y1="1495" x2="490" y2="1525" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="1570" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="1575" text-anchor="middle" font-size="10" fill="white">3</text>

  <rect x="200" y="1555" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
