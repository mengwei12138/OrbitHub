  <line x1="570" y1="1540" x2="320" y2="1570" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

  <!-- ========== 图例 ========== -->
  <rect x="750" y="1510" width="230" height="80" fill="#fafafa" stroke="#d9d9d9" rx="5"/>
  <text x="760" y="1528" font-size="10" font-weight="bold">图例</text>
  <circle cx="775" cy="1548" r="8" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="790" y="1551" font-size="9">用户操作</text>
  <circle cx="775" cy="1573" r="8" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="790" y="1576" font-size="9">前端成功</text>
  <line x1="820" y1="1548" x2="850" y2="1548" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
