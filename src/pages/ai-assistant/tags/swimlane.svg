  <line x1="260" y1="1305" x2="490" y2="1335" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="1380" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="1385" text-anchor="middle" font-size="10" fill="white">5</text>

  <rect x="200" y="1365" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
