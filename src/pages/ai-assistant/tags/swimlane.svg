  <text x="90" y="595" text-anchor="middle" font-size="10" fill="white">1</text>

  <rect x="200" y="575" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="260" y="595" text-anchor="middle" font-size="10">切换页码</text>

  <line x1="108" y1="590" x2="200" y2="590" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="635" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="90" y="640" text-anchor="middle" font-size="10" fill="white">2</text>

  <rect x="490" y="620" width="160" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="570" y="640" text-anchor="middle" font-size="10">GET /api/tags</text>

  <line x1="260" y1="605" x2="490" y2="635" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="680" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
