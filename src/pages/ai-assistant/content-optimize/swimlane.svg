  <rect x="740" y="1000" width="120" height="30" rx="5" fill="#d9d7fb" stroke="#722ed1" stroke-width="2"/>
  <text x="800" y="1020" text-anchor="middle" font-size="10">状态: applied-pending</text>
  <line x1="265" y1="985" x2="740" y2="1015" stroke="#722ed1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== F. 确认重发布 ========== -->
