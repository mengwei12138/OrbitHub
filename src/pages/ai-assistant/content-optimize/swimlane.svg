  <circle cx="90" cy="350" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="355" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="200" y="335" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
