  <line x1="108" y1="350" x2="200" y2="350" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="395" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="400" text-anchor="middle" font-size="10" fill="white">2</text>
  <rect x="200" y="380" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
