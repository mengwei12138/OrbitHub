  <circle cx="90" cy="1175" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="90" y="1180" text-anchor="middle" font-size="10" fill="white">2</text>
  <rect x="490" y="1160" width="180" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
