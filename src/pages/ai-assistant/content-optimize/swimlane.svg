  <circle cx="90" cy="1545" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="1550" text-anchor="middle" font-size="10" fill="white">2</text>
  <rect x="200" y="1530" width="120" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="260" y="1550" text-anchor="middle" font-size="10">router.push</text>
  <line x1="260" y1="1515" x2="260" y2="1530" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
