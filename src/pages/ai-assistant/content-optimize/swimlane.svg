  <line x1="260" y1="365" x2="260" y2="380" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== C. AI优化触发 ========== -->
  <line x1="10" y1="460" x2="990" y2="460" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="15" y="455" font-size="11" fill="#8c8c8c">C. AI优化触发</text>

  <circle cx="90" cy="490" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="495" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="200" y="475" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="260" y="495" text-anchor="middle" font-size="10">点击AI优化</text>
  <line x1="108" y1="490" x2="200" y2="490" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="535" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="540" text-anchor="middle" font-size="10" fill="white">2</text>
  <rect x="200" y="520" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
