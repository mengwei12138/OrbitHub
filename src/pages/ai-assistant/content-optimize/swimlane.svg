  <line x1="260" y1="505" x2="260" y2="520" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="580" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="90" y="585" text-anchor="middle" font-size="10" fill="white">3</text>
  <rect x="490" y="565" width="180" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="580" y="585" text-anchor="middle" font-size="10">POST /api/v1/ai-assistant/content-optimize/{contentId}/optimize</text>
