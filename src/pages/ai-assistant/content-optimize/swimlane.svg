  <circle cx="90" cy="625" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="630" text-anchor="middle" font-size="10" fill="white">4</text>
  <rect x="200" y="610" width="140" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="270" y="630" text-anchor="middle" font-size="10">显示优化建议卡片</text>
  <line x1="580" y1="595" x2="320" y2="625" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

