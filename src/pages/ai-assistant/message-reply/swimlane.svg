  <circle cx="90" cy="1690" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="1695" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="200" y="1675" width="130" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="265" y="1695" text-anchor="middle" font-size="10">AccountSelector</text>
  <line x1="108" y1="1690" x2="200" y2="1690" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="1735" r="18" fill="#d9d7fb" stroke="#722ed1" stroke-width="2"/>
