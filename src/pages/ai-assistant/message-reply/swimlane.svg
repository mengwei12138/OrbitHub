  <line x1="200" y1="1750" x2="200" y2="1765" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="350" cy="1780" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="350" y="1785" text-anchor="middle" font-size="10" fill="white">4</text>
  <rect x="490" y="1765" width="200" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
