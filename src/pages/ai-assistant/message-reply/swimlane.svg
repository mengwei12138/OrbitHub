  <text x="15" y="555" font-size="11" fill="#8c8c8c">D. 立即抓取</text>

  <circle cx="90" cy="590" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="595" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="200" y="575" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="260" y="595" text-anchor="middle" font-size="10">点击立即抓取</text>
  <line x1="108" y1="590" x2="200" y2="590" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="635" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
