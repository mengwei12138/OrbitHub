  <rect x="490" y="1575" width="140" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="560" y="1595" text-anchor="middle" font-size="10">GET /api/v1/ai-message/{id}</text>
