  <line x1="260" y1="605" x2="490" y2="635" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="680" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
