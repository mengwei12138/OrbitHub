  <line x1="260" y1="1325" x2="260" y2="1340" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="1400" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
