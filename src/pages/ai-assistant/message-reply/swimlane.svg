  <circle cx="90" cy="1780" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="1785" text-anchor="middle" font-size="10" fill="white">3</text>
  <rect x="200" y="1765" width="150" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
