      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
  </defs>

  <rect width="1000" height="1850" fill="#fafafa"/>
  <text x="500" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">私信AI自动回复 - 交互泳道图</text>

  <!-- 泳道 -->
  <rect x="10" y="45" width="160" height="1795" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="90" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#1890ff">用户</text>

  <rect x="180" y="45" width="280" height="1795" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="320" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#52c41a">前端组件</text>

  <rect x="470" y="45" width="240" height="1795" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="590" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#fa8c16">后端 API</text>

