  <circle cx="90" cy="450" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="455" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="200" y="435" width="120" height="30" rx="5" fill="#ffccc7" stroke="#ff4d4f" stroke-width="2"/>
  <text x="260" y="455" text-anchor="middle" font-size="10">选择频率</text>
  <line x1="108" y1="450" x2="200" y2="450" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="495" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
