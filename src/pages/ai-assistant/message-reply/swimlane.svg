  <circle cx="90" cy="120" r="18" fill="#1890ff" stroke="#096dd9" stroke-width="2"/>
  <text x="90" y="125" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="200" y="105" width="130" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="265" y="125" text-anchor="middle" font-size="10">MessageReplyPage</text>
  <line x1="108" y1="120" x2="200" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="165" r="18" fill="#fa8c16" stroke="#d48806" stroke-width="2"/>
  <text x="90" y="170" text-anchor="middle" font-size="10" fill="white">2</text>
  <rect x="490" y="150" width="180" height="30" rx="5" fill="#ffe58f" stroke="#fa8c16" stroke-width="2"/>
  <text x="580" y="170" text-anchor="middle" font-size="10">GET /api/v1/accounts</text>
  <line x1="265" y1="135" x2="490" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="90" cy="210" r="18" fill="#52c41a" stroke="#389e0d" stroke-width="2"/>
  <text x="90" y="215" text-anchor="middle" font-size="10" fill="white">3</text>
  <rect x="200" y="195" width="130" height="30" rx="5" fill="#b7eb8f" stroke="#52c41a" stroke-width="2"/>
  <text x="265" y="215" text-anchor="middle" font-size="10">AccountSelector</text>
  <line x1="580" y1="180" x2="320" y2="210" stroke="#52c41a" stroke-width="1.5" marker-end="url(#arrowhead-success)"/>

