# =============================================
# 8. 从子页面返回主页
# =============================================
---
interaction:
  type: navigation
  name: 从子页面返回主页
  trigger:
    component: BackButton
    action: onClick

  mainFlow:
    - step: 1
      description: 点击返回按钮
      component: BackButton
      action: onClick
      onDone: step_2

    - step: 2
      description: 跳转回AI助手主页
      component: router
      action:
        method: push
        props:
          path: /ai-assistant

    - step: 3
      description: 恢复主页状态
      component: AIAssistantPage
      action:
        method: restoreState

  states:
    - name: previous_path
      type: string
      default: /ai-assistant
