# =============================================
# 24. 回复记录筛选
# =============================================
---
interaction:
  type: list
  name: 回复记录筛选
  trigger:
    component: HistoryFilters
    action: onChange

  mainFlow:
    - step: 1
      description: 获取筛选条件
      component: HistoryFilters
      action:
        method: getValues
      onDone: step_2

    - step: 2
      description: 重新加载列表
      component: ReplyHistoryList
      action:
        method: reload
        props:
          filters: { filterValues }


# =============================================
# 25. 查看回复记录详情
# =============================================
---
interaction:
  type: modal
  name: 查看回复记录详情
  trigger:
    component: ViewDetailButton
    action: onClick

  mainFlow:
    - step: 1
      description: 显示详情弹窗
      component: HistoryDetailModal
      action:
        method: open
        props:
          record: { record }
      onDone: step_2

    - step: 2
      description: 渲染本地详情数据（契约未提供独立详情查询，使用列表项数据）
      component: HistoryDetailModal
      action:
        method: setData
        props:
          comment: { record.comment }
          reply: { record.reply }
          status: { record.status }
      onDone: step_3

    - step: 3
      description: 完成详情展示
      component: HistoryDetailModal
      action:
        method: ready

  randomEvents:
    - trigger: 关闭弹窗
      name: 关闭详情弹窗
      component: HistoryDetailModal
      action: onClose

  states:
    - name: current_record
      type: object
      default: null


# =============================================
# 26. 账号离线显示警告
# =============================================
---
interaction:
  type: state
  name: 账号离线显示警告
  trigger:
    component: AccountStatusMonitor
    action: onStatusChange

  mainFlow:
    - step: 1
      description: 检查账号状态
      component: AccountStatusMonitor
      action:
        method: checkAccountStatus
      onDone: step_2

    - step: 2a
      description: 有账号离线
      condition: hasOfflineAccounts == true
      parallel:
        - name: 显示警告图标
          component: AutoReplySwitch
          action:
            method: showWarning
        - name: 悬停显示离线账号列表
          component: OfflineAccountsTooltip
          action:
            method: setContent
            props:
              accounts: { offlineAccounts }

    - step: 2b
      description: 所有账号在线
      condition: hasOfflineAccounts == false
      component: AutoReplySwitch
      action:
        method: hideWarning

  states:
    - name: offline_accounts
      type: array
      default: []
    - name: has_offline
      type: boolean
      default: false
