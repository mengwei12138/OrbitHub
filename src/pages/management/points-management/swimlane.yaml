## 交互逻辑

### 1. 页头区域

| 交互 | 行为 |
|------|------|
| 点击「导出报表」 | 触发报表导出功能 |

### 2. 各公司积分总览表格

| 交互 | 行为 |
|------|------|
| 查看表格 | 展示所有公司的积分总览数据 |
| 分页切换 | 切换当前页显示的公司数据 |
| 点击「明细」链接 | 跳转至对应公司的积分明细页面 |

### 3. 积分消耗明细表格

| 交互 | 行为 |
|------|------|
| 租户筛选 | 下拉选择公司，筛选对应租户的消耗记录 |
| 日期筛选 | 下拉选择日期范围，筛选对应时间段的消耗记录 |
| 查看表格 | 展示符合筛选条件的积分消耗明细数据 |
| 分页切换 | 切换当前页显示的消耗明细数据 |
