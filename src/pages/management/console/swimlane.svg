<svg height="400" viewbox="0 0 800 400" width="800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <marker id="arrowhead" markerheight="10" markerwidth="7" refx="7" refy="5" orient="auto">
      <polygon fill="#666" points="0 0, 10 5, 0 10"></polygon>
    </marker>
  </defs>

  <!-- 标题 -->
  <text fill="#1F1F1F" font-size="20" font-weight="700" x="350" y="30">控制台 - 交互泳道图</text>

  <!-- 泳道 -->
  <!-- 用户 -->
  <rect fill="#E8F4FD" rx="8" stroke="#1890FF" stroke-width="2" x="50" y="60"></rect>
  <text fill="#1890FF" font-size="16" font-weight="600" x="60" y="85">用户</text>

  <!-- 前端 -->
  <rect fill="#F6FFED" rx="8" stroke="#52C41A" stroke-width="2" x="50" y="140"></rect>
  <text fill="#52C41A" font-size="16" font-weight="600" x="60" y="165">前端</text>

  <!-- 后端 -->
  <rect fill="#FFF7E6" rx="8" stroke="#FA8C16" stroke-width="2" x="50" y="220"></rect>
  <text fill="#FA8C16" font-size="16" font-weight="600" x="60" y="245">后端</text>

  <!-- 数据库 -->
  <rect fill="#F9F0FF" rx="8" stroke="#722ED1" stroke-width="2" x="50" y="300"></rect>
  <text fill="#722ED1" font-size="16" font-weight="600" x="60" y="325">数据库</text>

  <!-- 流程箭头 -->
  <!-- 1. 进入页面 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="150" x2="150" y1="100" y2="135"></line>
  <text fill="#666" font-size="12" x="160" y="125">1. 进入页面</text>

  <!-- 2. 加载数据请求 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="150" x2="150" y1="180" y2="215"></line>
  <text fill="#666" font-size="12" x="160" y="205">2. 请求看板数据</text>

  <!-- 3. 查询数据库 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="150" x2="150" y1="260" y2="295"></line>
  <text fill="#666" font-size="12" x="160" y="285">3. 查询统计</text>

  <!-- 4. 返回数据 -->
  <line marker-end="url(#arrowhead)" stroke="#52C41A" x1="150" x2="150" y1="295" y2="180"></line>
  <line marker-end="url(#arrowhead)" stroke="#52C41A" x1="200" x2="200" y1="295" y2="180"></line>
  <text fill="#52C41A" font-size="12" x="210" y="240">4. 返回数据</text>

  <!-- 5. 渲染页面 -->
  <text fill="#52C41A" font-size="12" x="160" y="175">5. 渲染组件</text>

  <!-- 分页流程 -->
  <!-- 6. 点击分页 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="400" x2="400" y1="100" y2="135"></line>
  <text fill="#666" font-size="12" x="320" y="125">6. 点击分页</text>

  <!-- 7. 请求新页数据 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="400" x2="400" y1="180" y2="215"></line>
  <text fill="#666" font-size="12" x="410" y="205">7. 请求新页数据</text>

  <!-- 8. 查询 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="400" x2="400" y1="260" y2="295"></line>
  <text fill="#666" font-size="12" x="410" y="285">8. 查询</text>

  <!-- 9. 返回 -->
  <line marker-end="url(#arrowhead)" stroke="#52C41A" x1="400" x2="400" y1="295" y2="180"></line>
  <text fill="#52C41A" font-size="12" x="320" y="175">9. 返回新页数据</text>

  <!-- 刷新流程 -->
  <!-- 10. 点击刷新 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="650" x2="650" y1="100" y2="135"></line>
  <text fill="#666" font-size="12" x="580" y="125">10. 点击刷新</text>

  <!-- 11. 重新请求 -->
  <line marker-end="url(#arrowhead)" stroke="#666" x1="650" x2="650" y1="180" y2="215"></line>
  <text fill="#666" font-size="12" x="660" y="205">11. 重新请求</text>

  <!-- 12. 返回最新数据 -->
  <line marker-end="url(#arrowhead)" stroke="#52C41A" x1="650" x2="650" y1="260" y2="180"></line>
  <text fill="#52C41A" font-size="12" x="580" y="175">12. 返回最新数据</text>
</svg>
