# 交互逻辑 YAML

## 页面信息

- **页面名称**: 控制台
- **路由**: /management/console
- **功能概述**: 后台管理系统的控制台页面，展示运营看板和最近动态

## 页面结构

### 1. 页面头部 (page-header)
- 标题: "控制台"
- 刷新按钮: 点击刷新当前页面数据

### 2. 运营看板区块 (section/运营看板)
- 区块标题: "运营看板"
- 统计卡片行: 包含多个 stat-card 组件

### 3. 最近动态区块 (section/最近动态)
- 区块标题: "最近动态"
- 最近动态列表: 显示最近的系统动态日志
- 分页组件: 支持分页查看

## 组件清单

| 组件名 | 类型 | 说明 |
|--------|------|------|
| stat-card | 统计卡片 | 展示单个统计指标 |
| log-row | 日志行 | 显示单条动态信息 |
| Pagination | 分页 | 分页导航组件 |

## 用户操作流程

1. 用户进入控制台页面
2. 页面自动加载运营看板数据和最近动态
3. 用户可点击刷新按钮刷新数据
4. 用户可通过分页查看更多历史动态
