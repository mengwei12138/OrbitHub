server {
  listen 3000;
  server_name _;
  absolute_redirect off;

  # 隐藏版本号
  server_tokens off;

  # 占位变量 Dockerfile会匹配/dev替换
  set $app_version /dev;

  location / {
    index index.html;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    root /usr/share/nginx/html$app_version;

    try_files $uri $uri/ /index.html;

    # 预压缩文件（优先使用）
    gzip_static on;
    brotli_static on;

    # 实时压缩降级
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    expires -1; # 默认不缓存
    if ($uri ~ \.(js|css)$) {
      expires 1d;
    }
    if ($uri ~ \.(jpg|jpeg|png|svg|gif|ico)$) {
      expires 1d;
    }
    if ($uri ~ \.(mp4)$) {
      expires 7d;
    }

    # 应用的特殊策略
    # if ($uri ~ /xxx/) {
    #   alias /usr/share/nginx/html$app_version/xxx;
    #   index index.html;
    # }

    # valid_referers server_names blocked none 127.0.0.1 *.dev.k8s;
    # if ($invalid_referer) {
    #   return 403;
    # }

    if (-d $request_filename) {
      rewrite ^(.+[^/])$ $app_version$1/ permanent;
    }
  }
}
